name: 채용공고 자동 업데이트

on:
  schedule:
    # 매일 오전 8시 KST (UTC 23:00 전날) 실행
    - cron: '0 23 * * *'
  workflow_dispatch:  # 수동 실행 버튼 활성화

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 의존성 설치
        run: pip install requests

      - name: 워크넷 채용공고 수집
        env:
          WORKNET_API_KEY: ${{ secrets.WORKNET_API_KEY }}
        run: python scripts/fetch_jobs.py

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/jobs.json
          git diff --cached --quiet || git commit -m "chore: 채용공고 업데이트 $(date +'%Y-%m-%d KST' -d '+9 hours')"
          git push
