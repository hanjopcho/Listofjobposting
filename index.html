<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>채용공고 대시보드 | 한지혜</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #111827;
      --accent: #4f46e5;
      --accent-light: #eef2ff;
      --bg: #f5f5f0;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --danger: #ef4444;
    }

    body {
      font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 2rem 1.5rem 1.75rem;
    }
    .header-inner {
      max-width: 1120px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.375rem; font-weight: 700; letter-spacing: -0.01em; }
    header .sub {
      font-size: 0.8rem;
      opacity: 0.55;
      margin-top: 0.3rem;
      line-height: 1.6;
    }
    #last-updated {
      font-size: 0.75rem;
      opacity: 0.45;
      text-align: right;
      white-space: nowrap;
    }

    /* ─── Main ─── */
    main {
      max-width: 1120px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ─── Section label ─── */
    .section-label {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.875rem;
    }

    /* ─── Quick links ─── */
    .quick-links-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 0.625rem;
      margin-bottom: 2.5rem;
    }
    .site-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }
    .site-card:hover {
      border-color: var(--accent);
      box-shadow: 0 2px 10px rgba(79,70,229,0.12);
      transform: translateY(-1px);
    }
    .site-card .site-name {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--accent);
    }
    .site-card .site-query {
      font-size: 0.75rem;
      color: var(--muted);
    }
    .site-card .arrow {
      font-size: 0.7rem;
      color: var(--border);
      margin-top: 0.25rem;
    }
    .site-card:hover .arrow { color: var(--accent); }

    /* ─── Divider ─── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 0 0 2rem;
    }

    /* ─── Filter bar ─── */
    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.375rem;
      align-items: center;
      margin-bottom: 0.625rem;
    }
    .filter-row:last-of-type { margin-bottom: 1.25rem; }
    .filter-label {
      font-size: 0.75rem;
      color: var(--muted);
      min-width: 32px;
    }
    .filter-btn {
      padding: 0.35rem 0.85rem;
      border-radius: 9999px;
      border: 1px solid var(--border);
      background: white;
      font-size: 0.78rem;
      font-family: inherit;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
    .filter-btn.active {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* ─── Results count ─── */
    .results-meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    /* ─── Job grid ─── */
    .job-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 0.875rem;
    }

    .job-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.125rem 1.25rem;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.625rem;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.15s;
    }
    .job-card:hover {
      border-color: var(--accent);
      box-shadow: 0 4px 16px rgba(79,70,229,0.1);
      transform: translateY(-2px);
    }

    .job-card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .job-title {
      font-size: 0.925rem;
      font-weight: 600;
      line-height: 1.45;
      flex: 1;
    }
    .badge-source {
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.2rem 0.45rem;
      border-radius: 4px;
      background: var(--accent-light);
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .job-company {
      font-size: 0.825rem;
      color: var(--muted);
    }

    .job-info {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      font-size: 0.78rem;
      color: var(--muted);
    }

    .job-footer {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 0.5rem;
      margin-top: auto;
    }
    .job-keyword {
      font-size: 0.72rem;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      background: #f3f4f6;
      color: #6b7280;
    }
    .job-deadline {
      font-size: 0.72rem;
      color: var(--danger);
      font-weight: 600;
    }

    /* ─── Empty / Loading states ─── */
    .state-box {
      grid-column: 1 / -1;
      text-align: center;
      padding: 4rem 2rem;
      color: var(--muted);
    }
    .state-box h3 { font-size: 0.95rem; color: var(--text); margin-bottom: 0.5rem; }
    .state-box p { font-size: 0.85rem; line-height: 1.7; }

    /* ─── Responsive ─── */
    @media (max-width: 640px) {
      .quick-links-grid { grid-template-columns: repeat(2, 1fr); }
      .job-grid { grid-template-columns: 1fr; }
      .header-inner { flex-direction: column; align-items: flex-start; }
      #last-updated { text-align: left; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <h1>채용공고 대시보드</h1>
      <p class="sub">그래픽 · 브랜드 · 콘텐츠 디자이너&nbsp;&nbsp;|&nbsp;&nbsp;강남 · 서초 · 성남 · 용인 · 수원</p>
    </div>
    <div id="last-updated">데이터 로딩 중…</div>
  </div>
</header>

<main>

  <!-- ① 타 사이트 바로가기 -->
  <div class="section-label">채용사이트 바로가기</div>
  <div class="quick-links-grid" id="quick-links"></div>

  <hr class="divider">

  <!-- ② 워크넷 공고 -->
  <div class="section-label">워크넷 채용공고</div>

  <div class="filter-row">
    <span class="filter-label">직무</span>
    <button class="filter-btn active" data-type="job" data-value="all">전체</button>
    <button class="filter-btn" data-type="job" data-value="그래픽">그래픽디자이너</button>
    <button class="filter-btn" data-type="job" data-value="브랜드">브랜드디자이너</button>
    <button class="filter-btn" data-type="job" data-value="콘텐츠">콘텐츠디자이너</button>
  </div>

  <div class="filter-row">
    <span class="filter-label">지역</span>
    <button class="filter-btn active" data-type="region" data-value="all">전체</button>
    <button class="filter-btn" data-type="region" data-value="강남">강남구</button>
    <button class="filter-btn" data-type="region" data-value="서초">서초구</button>
    <button class="filter-btn" data-type="region" data-value="성남">성남시</button>
    <button class="filter-btn" data-type="region" data-value="용인">용인시</button>
    <button class="filter-btn" data-type="region" data-value="수원">수원시</button>
  </div>

  <div class="results-meta" id="results-meta"></div>
  <div class="job-grid" id="job-grid"></div>

</main>

<script>
  /* ── 타 사이트 바로가기 데이터 ── */
  const QUICK_LINKS = [
    { site: '잡코리아', query: '그래픽디자이너 강남/서초/성남', url: 'https://www.jobkorea.co.kr/Search/?stext=%EA%B7%B8%EB%9E%98%ED%94%BD%EB%94%94%EC%9E%90%EC%9D%B4%EB%84%88&local=I010127%7CI010128%7CI020290%7CI020310%7CI020320' },
    { site: '잡코리아', query: '브랜드디자이너', url: 'https://www.jobkorea.co.kr/Search/?stext=%EB%B8%8C%EB%9E%9C%EB%93%9C%EB%94%94%EC%9E%90%EC%9D%B4%EB%84%88&local=I010127%7CI010128%7CI020290%7CI020310%7CI020320' },
    { site: '사람인', query: '그래픽디자이너', url: 'https://www.saramin.co.kr/zf_user/search?searchword=%EA%B7%B8%EB%9E%98%ED%94%BD%EB%94%94%EC%9E%90%EC%9D%B4%EB%84%88&search_done=y' },
    { site: '사람인', query: '브랜드/콘텐츠디자이너', url: 'https://www.saramin.co.kr/zf_user/search?searchword=%EB%B8%8C%EB%9E%9C%EB%93%9C+%EB%94%94%EC%9E%90%EC%9D%B4%EB%84%88&search_done=y' },
    { site: '원티드', query: '비주얼/그래픽디자이너', url: 'https://www.wanted.co.kr/wdlist/518/862?country=kr&job_sort=job.latest_order&years=-1&locations=seoul.gyeonggi' },
    { site: '원티드', query: '브랜드디자이너', url: 'https://www.wanted.co.kr/wdlist/518/669?country=kr&job_sort=job.latest_order&years=-1&locations=seoul.gyeonggi' },
    { site: '리멤버', query: '그래픽디자이너', url: 'https://career.rememberapp.co.kr/job/list?keyword=%EA%B7%B8%EB%9E%98%ED%94%BD%EB%94%94%EC%9E%90%EC%9D%B4%EB%84%88' },
    { site: '잡플래닛', query: '그래픽디자이너', url: 'https://www.jobplanet.co.kr/job/search?q=%EA%B7%B8%EB%9E%98%ED%94%BD+%EB%94%94%EC%9E%90%EC%9D%B4%EB%84%88' },
    { site: '잡플래닛', query: '브랜드디자이너', url: 'https://www.jobplanet.co.kr/job/search?q=%EB%B8%8C%EB%9E%9C%EB%93%9C+%EB%94%94%EC%9E%90%EC%9D%B4%EB%84%88' },
  ];

  /* ── Quick links 렌더 ── */
  const qlEl = document.getElementById('quick-links');
  QUICK_LINKS.forEach(({ site, query, url }) => {
    const a = document.createElement('a');
    a.className = 'site-card';
    a.href = url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.innerHTML = `<span class="site-name">${site}</span><span class="site-query">${query}</span><span class="arrow">바로가기 →</span>`;
    qlEl.appendChild(a);
  });

  /* ── 필터 상태 ── */
  let allJobs = [];
  let activeJob = 'all';
  let activeRegion = 'all';

  function getFiltered() {
    return allJobs.filter(job => {
      const jMatch = activeJob === 'all' ||
        (job.keyword || '').includes(activeJob) ||
        (job.title || '').includes(activeJob);
      const rMatch = activeRegion === 'all' ||
        (job.region || '').includes(activeRegion) ||
        (job.location || '').includes(activeRegion);
      return jMatch && rMatch;
    });
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s || '';
    return d.innerHTML;
  }

  function renderJobs() {
    const list = getFiltered();
    const grid = document.getElementById('job-grid');
    const meta = document.getElementById('results-meta');
    meta.textContent = `워크넷 공고 ${list.length}건`;

    if (!list.length) {
      grid.innerHTML = `<div class="state-box"><h3>해당하는 공고가 없습니다</h3><p>필터를 변경하거나 위 바로가기 링크로 직접 검색해보세요.</p></div>`;
      return;
    }

    grid.innerHTML = list.map(j => `
      <a href="${esc(j.url)}" target="_blank" rel="noopener noreferrer" class="job-card">
        <div class="job-card-top">
          <div class="job-title">${esc(j.title)}</div>
          <span class="badge-source">${esc(j.source || '워크넷')}</span>
        </div>
        <div class="job-company">${esc(j.company)}</div>
        <div class="job-info">
          <span>📍 ${esc(j.region || j.location)}</span>
          ${j.salary ? `<span>💰 ${esc(j.salary)}</span>` : ''}
          ${j.posted ? `<span>📅 ${esc(j.posted)}</span>` : ''}
        </div>
        <div class="job-footer">
          ${j.keyword ? `<span class="job-keyword">${esc(j.keyword)}</span>` : '<span></span>'}
          ${j.deadline ? `<span class="job-deadline">마감 ${esc(j.deadline)}</span>` : ''}
        </div>
      </a>
    `).join('');
  }

  /* ── 필터 버튼 이벤트 ── */
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const type = btn.dataset.type;
      const value = btn.dataset.value;
      document.querySelectorAll(`.filter-btn[data-type="${type}"]`).forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (type === 'job') activeJob = value;
      else activeRegion = value;
      renderJobs();
    });
  });

  /* ── 데이터 로드 ── */
  fetch(`./data/jobs.json?t=${Date.now()}`)
    .then(r => {
      if (!r.ok) throw new Error('no data');
      return r.json();
    })
    .then(data => {
      allJobs = data.jobs || [];
      const upd = document.getElementById('last-updated');
      upd.textContent = data.updated_at ? `마지막 업데이트: ${data.updated_at} KST` : '';
      renderJobs();
    })
    .catch(() => {
      document.getElementById('last-updated').textContent = '워크넷 데이터 미설정 상태';
      document.getElementById('results-meta').textContent = '';
      document.getElementById('job-grid').innerHTML = `
        <div class="state-box">
          <h3>워크넷 API 설정이 필요합니다</h3>
          <p>
            워크넷 OpenAPI 키를 GitHub Secret에 등록하면<br>
            매일 자동으로 공고가 수집됩니다.<br><br>
            지금은 위 바로가기 링크를 통해 직접 확인해보세요.
          </p>
        </div>
      `;
    });
</script>

</body>
</html>
